name: Release Obsidian Plugin

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build
      - run: pnpm package
      - name: Verify tag matches manifest
        run: test "$GITHUB_REF_NAME" = "$(node -p "require('./manifest.json').version")"
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          release/obsidian/travelog-planner/main.js
          release/obsidian/travelog-planner/manifest.json
          release/obsidian/travelog-planner/styles.css
          release/travelog-planner-notion-${GITHUB_REF_NAME}.zip
          --generate-notes
          --title "$GITHUB_REF_NAME"
